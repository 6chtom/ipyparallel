ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0671d8ab202c4ac093b78433ae5baf74f3fc7246  # frozen: v0.15.15
    hooks:
      - id: ruff
        args:
          - "--fix"
        exclude_types:
          - jupyter
      - id: ruff
        name: ruff (notebooks)
        args:
          - "--fix"
        types:
          - jupyter
      - id: ruff-format
        # run via nbqa to handle cell magics
        exclude_types:
          - jupyter
  # run ruff via nbqa, which has better and configurable handling of cell magics
  # than ruff itself
  # but has trouble with isort rules
  - repo: https://github.com/nbQA-dev/nbQA
    rev: f96ec7f3b26a32619435686eb5813235f7e3327e  # frozen: 1.9.1
    hooks:
      - id: nbqa-ruff-format
      - id: nbqa-ruff-check
        args:
          - --fix
          # isort rules get confused in the temporary files
          - --ignore=I
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: 515f543f5718ebfd6ce22e16708bb32c68ff96e1 # frozen: v3.8.3
    hooks:
      - id: prettier

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
    hooks:
      - id: zizmor
        args:
          - --fix=all
      - id: zizmor
        args:
          - --fix=all
          - --config=zizmor-strict.yaml
        files: .github/workflows/release.yml

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: requirements-txt-fixer
